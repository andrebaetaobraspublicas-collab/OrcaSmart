name: Deploy Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bundle MySQL runtime dependency
        run: |
          npm install --prefix .deploy-mysql2 --omit=dev --ignore-scripts mysql2@3.11.5
          mkdir -p node_modules
          cp -R .deploy-mysql2/node_modules/. node_modules/
          rm -rf .deploy-mysql2

      - name: Signal Node restart
        run: |
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > tmp/restart.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.HOSTINGER_TARGET_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/__pycache__/**
            **/*.pyc
            **/.env
            **/*.db
            **/*.sqlite
            **/*.sqlite3
            **/tenant_dbs/**
            **/exports/**
