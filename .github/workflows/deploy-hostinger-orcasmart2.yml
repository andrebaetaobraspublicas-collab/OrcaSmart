name: Deploy Hostinger - OrcaSmart2 Teste

on:
  push:
    branches:
      - orcasmart2
  workflow_dispatch:

jobs:
  deploy-orcasmart2:
    runs-on: ubuntu-latest
    env:
      ORCASMART2_TARGET_DIR: ${{ secrets.HOSTINGER_ORCASMART2_TARGET_DIR || '/domains/forestgreen-turkey-374923.hostingersite.com/nodejs/' }}
    steps:
      - name: Validar branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "orcasmart2" ]; then
            echo "Este workflow de homologacao deve ser executado somente pela branch orcasmart2."
            echo "Branch recebida: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Validar diretorio de homologacao
        run: |
          if [ -z "${ORCASMART2_TARGET_DIR}" ]; then
            echo "Diretorio de deploy do OrcaSmart2 nao definido."
            exit 1
          fi
          if [ "${ORCASMART2_TARGET_DIR}" = "${{ secrets.HOSTINGER_TARGET_DIR }}" ]; then
            echo "Diretorio do OrcaSmart2 nao pode ser igual ao diretorio de producao HOSTINGER_TARGET_DIR."
            exit 1
          fi
          echo "Deploy OrcaSmart2 target: ${ORCASMART2_TARGET_DIR}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: orcasmart2

      - name: Signal Node restart
        run: |
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > tmp/restart.txt

      - name: Deploy via FTP para homologacao
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ env.ORCASMART2_TARGET_DIR }}
          state-name: .ftp-deploy-sync-state-orcasmart2.json
          exclude: |
            **/.git*
            **/.git*/**
            **/__pycache__/**
            **/*.pyc
            **/.env
            **/*.db
            **/*.sqlite
            **/*.sqlite3
            **/tenant_dbs/**
            **/exports/**
